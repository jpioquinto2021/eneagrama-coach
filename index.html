function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function renderText(text){
  return text.split('\n').map((line,i)=>{
    if(!line.trim())return React.createElement('div',{key:i,style:{height:5}});
    const parts=line.split(/\*\*(.*?)\*\*/g);
    const isH=line.trim().startsWith('**'),isBullet=line.trim().startsWith('•');
    return React.createElement('p',{key:i,style:{margin:isBullet?"0.2rem 0 0.2rem 0.5rem":isH?"0.9rem 0 0.25rem":"0.3rem 0"}},
      parts.map((p,j)=>j%2===1?React.createElement('strong',{key:j,style:{color:isH?"#0f172a":"#1e293b",fontSize:isH?"15px":"inherit"}},p):p)
    );
  });
}

// ── GRÁFICAS SVG PERSONALIZADAS ────────────────────────────
function RadarSVG({sc}){
  const order=[9,1,2,3,4,5,6,7,8],n=9,S=270,cx=135,cy=135,R=95,maxV=25;
  const ang=i=>(i*2*Math.PI/n)-Math.PI/2;
  const px=(i,v)=>cx+(v/maxV)*R*Math.cos(ang(i));
  const py=(i,v)=>cy+(v/maxV)*R*Math.sin(ang(i));
  const gp=v=>order.map((_,i)=>`${i===0?'M':'L'}${px(i,v)},${py(i,v)}`).join(' ')+'Z';
  const dp=order.map((_,i)=>`${i===0?'M':'L'}${px(i,sc[order[i]]||0)},${py(i,sc[order[i]]||0)}`).join(' ')+'Z';
  return (
    <svg viewBox={`0 0 ${S} ${S}`} style={{width:'100%',maxWidth:S,display:'block',margin:'0 auto'}}>
      {[5,10,15,20,25].map(v=><path key={v} d={gp(v)} fill="none" stroke="rgba(6,182,212,0.18)" strokeWidth={1}/>)}
      {order.map((_,i)=><line key={i} x1={cx} y1={cy} x2={px(i,25)} y2={py(i,25)} stroke="rgba(6,182,212,0.12)" strokeWidth={1}/>)}
      <path d={dp} fill="rgba(6,182,212,0.22)" stroke="#06B6D4" strokeWidth={2}/>
      {order.map((t,i)=><circle key={i} cx={px(i,sc[t]||0)} cy={py(i,sc[t]||0)} r={3} fill="#06B6D4"/>)}
      {order.map((t,i)=>{
        const lx=cx+(R+20)*Math.cos(ang(i)),ly=cy+(R+20)*Math.sin(ang(i));
        return <text key={i} x={lx} y={ly} textAnchor="middle" dominantBaseline="middle" fill="#94a3b8" fontSize={10} fontWeight="600" fontFamily="Segoe UI,sans-serif">{TI[t].emoji}T{t}</text>;
      })}
    </svg>
  );
}

function DonutSVG({data,dominant}){
  const S=160,cx=80,cy=80,ro=68,ri=46;
  const total=data.reduce((s,d)=>s+d.value,0)||1;
  let a=-Math.PI/2;
  const cos=Math.cos,sin=Math.sin;
  return (
    <svg viewBox={`0 0 ${S} ${S}`} style={{width:'100%',maxWidth:S,display:'block',margin:'0 auto'}}>
      {data.map((d,i)=>{
        const start=a,span=(d.value/total)*2*Math.PI;
        a+=span;const end=a,large=span>Math.PI?1:0;
        const path=[`M${cx+ro*cos(start)},${cy+ro*sin(start)}`,`A${ro},${ro},0,${large},1,${cx+ro*cos(end)},${cy+ro*sin(end)}`,`L${cx+ri*cos(end)},${cy+ri*sin(end)}`,`A${ri},${ri},0,${large},0,${cx+ri*cos(start)},${cy+ri*sin(start)}`,'Z'].join(' ');
        return <path key={i} d={path} fill={d.color} opacity={d.key===dominant?1:0.4}/>;
      })}
    </svg>
  );
}

        </div>
        <div style={{maxWidth:640,margin:"0 auto",padding:"1.5rem"}}>
          <div style={{background:`linear-gradient(135deg,${BG},${BG2})`,borderRadius:14,padding:"1rem 1.25rem",marginBottom:"1.5rem",border:"1px solid rgba(6,182,212,0.15)"}}>
            <p style={{color:"#94a3b8",fontSize:13,margin:0,lineHeight:1.7}}><strong style={{color:"white"}}>12 preguntas finales</strong> que revelan hacia dónde orienta tu energía: seguridad propia, vida social o conexiones íntimas.</p>
          </div>
          {subGroups.map(({sub,title,color},si)=>(
            <div key={sub} style={{marginBottom:"1.5rem"}}>
              <div style={{display:"flex",alignItems:"center",gap:"0.5rem",marginBottom:"0.75rem"}}>
                <div style={{height:3,flex:1,background:`linear-gradient(90deg,${color},transparent)`,borderRadius:2}}/>
                <span style={{color,fontWeight:700,fontSize:13}}>{title}</span>
                <div style={{height:3,flex:1,background:`linear-gradient(270deg,${color},transparent)`,borderRadius:2}}/>
              </div>
              {SQ.filter(q=>q.sub===sub).map((q,idx)=>(
                <div key={q.id} style={{background:"white",borderRadius:14,padding:"1.1rem",marginBottom:"0.75rem",border:`2px solid ${stAns[q.id]?color:"transparent"}`,transition:"all 0.2s",boxShadow:stAns[q.id]?`0 4px 12px ${color}1A`:"0 2px 6px rgba(0,0,0,0.06)"}}>
                  <p style={{color:"#1e293b",fontSize:13.5,fontWeight:500,margin:"0 0 0.85rem",lineHeight:1.6}}>
                    <span style={{color,fontWeight:800}}>{si*4+idx+1}. </span>{q.text}
                  </p>
                  <ScaleButtons qid={q.id} val={stAns[q.id]} onChange={setAnsST} color={color}/>
                </div>
              ))}
            </div>
          ))}
          <button onClick={finish} disabled={!stDone} style={{width:"100%",padding:"15px",borderRadius:13,background:stDone?`linear-gradient(135deg,${AQ},#0EA5E9)`:"#e2e8f0",color:stDone?"white":"#94a3b8",fontWeight:700,fontSize:15,border:"none",cursor:stDone?"pointer":"not-allowed"}}>🧭 Ver mi perfil completo</button>
          {!stDone&&<p style={{color:"#94a3b8",fontSize:12,textAlign:"center",marginTop:"0.5rem"}}>Responde las 12 preguntas para continuar</p>}
          <div style={{height:20}}/>
        </div>
      </div>
    );
  }

  if(screen==="loading") return (
    <div style={{minHeight:"100vh",background:`linear-gradient(135deg,${BG},${BG2})`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontFamily:"'Segoe UI',sans-serif",textAlign:"center",padding:"2rem"}}>
      <div style={{fontSize:70,marginBottom:"1.5rem"}}>🧭</div>
      <h2 style={{color:"white",fontSize:"1.4rem",fontWeight:700,margin:"0 0 0.5rem"}}>{fname}, construyendo tu perfil...</h2>
      <p style={{color:AQ,fontSize:14,margin:"0 0 2.5rem"}}>{lmsg}</p>
      <div style={{width:220,height:5,background:"rgba(255,255,255,0.1)",borderRadius:3,overflow:"hidden"}}>
        <div style={{height:"100%",background:`linear-gradient(90deg,${AQ},${PK})`,borderRadius:3,animationName:"bar",animationDuration:"2.5s",animationTimingFunction:"ease-in-out",animationIterationCount:"infinite"}}/>
      </div>
    </div>
  );

  if(screen==="result"&&result){
    const {primaryType:pt,wingType:wt,scores:sc,stScores,dominant}=result;
    const ti=TI[pt],wi=TI[wt];
    const ss=Object.entries(sc).sort((a,b)=>b[1]-a[1]);
    const top3=ss.slice(0,3).map(([t,v])=>({t:parseInt(t),v,...TI[parseInt(t)]}));
    const ctrSc={};Object.entries(CTR).forEach(([k,v])=>{ctrSc[k]=v.types.reduce((s,t)=>s+(sc[t]||0),0);});
    const ctrTotal=Math.max(Object.values(ctrSc).reduce((a,b)=>a+b,0),1);
    const myCenter=Object.entries(CTR).find(([,v])=>v.types.includes(pt))?.[0]||"";
    const stTotal=Math.max(stScores.SP+stScores.SO+stScores.SX,1);
    const stPcts={SP:Math.round(stScores.SP/stTotal*100),SO:Math.round(stScores.SO/stTotal*100),SX:100-Math.round(stScores.SP/stTotal*100)-Math.round(stScores.SO/stTotal*100)};
    const stSorted=Object.entries(stScores).sort((a,b)=>b[1]-a[1]);
    const secondary=stSorted[1][0],repressed=stSorted[2][0];
    const stPieData=["SP","SO","SX"].map(k=>({name:STI[k].name,value:stPcts[k],color:STI[k].color,key:k}));
    return (
      <div style={{minHeight:"100vh",background:"#f0f9ff",fontFamily:"'Segoe UI',sans-serif"}}>
        <div style={{background:`linear-gradient(160deg,${BG} 0%,#0C2235 40%,${ti.color}12 70%,${BG} 100%)`,padding:"2.5rem 1.5rem 2rem",textAlign:"center",position:"relative",overflow:"hidden"}}>
          <p style={{color:AQ,fontSize:10,letterSpacing:4,textTransform:"uppercase",margin:"0 0 1rem",fontWeight:600,position:"relative"}}>Tu Perfil · José Pioquinto Coach</p>
          <div style={{fontSize:72,marginBottom:"0.75rem",position:"relative"}}>{ti.emoji}</div>
          <div style={{color:"#64748b",fontSize:12,marginBottom:3,position:"relative"}}>Eneagrama Tipo {pt} · {fname}</div>
          <h1 style={{color:"white",fontSize:"2rem",fontWeight:900,margin:"0 0 0.35rem",position:"relative"}}>{ti.name}</h1>
          <p style={{color:PK,fontSize:13,margin:"0 0 0.4rem",position:"relative",fontWeight:600}}>con ala {wt} · {wi.name}</p>
          <p style={{color:STI[dominant].color,fontSize:12,margin:"0 0 1.25rem",position:"relative",fontWeight:600}}>{STI[dominant].emoji} Subtipo {STI[dominant].name}</p>
          <div style={{display:"flex",justifyContent:"center",gap:"0.6rem",flexWrap:"wrap",position:"relative"}}>
            {[{l:"Centro",v:ti.center},{l:"Virtud",v:VIRTUES[pt]},{l:"Pasión",v:PASSIONS[pt]}].map(b=>(
              <div key={b.l} style={{background:"rgba(255,255,255,0.07)",borderRadius:10,padding:"9px 14px",border:"1px solid rgba(6,182,212,0.15)"}}>
                <div style={{color:"#64748b",fontSize:9,textTransform:"uppercase",letterSpacing:1.5}}>{b.l}</div>
                <div style={{color:"white",fontWeight:700,fontSize:14,marginTop:2}}>{b.v}</div>
              </div>
            ))}
          </div>
        </div>
        <div style={{maxWidth:680,margin:"0 auto",padding:"1.5rem"}}>
          <div style={{background:BG2,borderRadius:18,padding:"1.5rem",marginBottom:"1.25rem",border:"1px solid rgba(6,182,212,0.15)"}}>
            <h3 style={{color:"white",margin:"0 0 0.25rem",fontSize:15,fontWeight:700}}>🕸️ Tu Mapa de Eneagrama</h3>
            <p style={{color:"#64748b",fontSize:11,margin:"0 0 1rem"}}>Los 9 tipos · Máx 25 puntos c/u</p>
            <RadarSVG sc={sc}/>
          </div>
          <div style={{background:"white",borderRadius:18,padding:"1.5rem",marginBottom:"1.25rem",boxShadow:"0 2px 10px rgba(0,0,0,0.06)",border:`2px solid ${STI[dominant].color}33`}}>
            <h3 style={{color:"#1e293b",margin:"0 0 1rem",fontSize:15,fontWeight:700}}>🎭 Tu Subtipo Instintivo</h3>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"1.5rem",alignItems:"center"}}>
              <DonutSVG data={stPieData} dominant={dominant}/>
              <div>
                {[{rank:"🥇 Dominante",key:dominant},{rank:"🥈 Secundario",key:secondary},{rank:"💤 Reprimido",key:repressed}].map(({rank,key})=>(
                  <div key={key} style={{marginBottom:"0.85rem"}}>
                    <div style={{fontSize:10,color:"#94a3b8",marginBottom:3,textTransform:"uppercase",letterSpacing:0.5}}>{rank}</div>
                    <div style={{display:"inline-flex",alignItems:"center",gap:6,background:key===dominant?`${STI[key].color}15`:"#f8fafc",borderRadius:8,padding:"5px 10px",border:key===dominant?`1px solid ${STI[key].color}40`:"none"}}>
                      <span style={{fontSize:16}}>{STI[key].emoji}</span>
                      <span style={{color:key===dominant?STI[key].color:"#64748b",fontWeight:key===dominant?700:500,fontSize:13}}>{STI[key].name} · {stPcts[key]}%</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
            <div style={{background:`${STI[dominant].color}0C`,borderRadius:10,padding:"0.75rem 1rem",marginTop:"1rem",borderLeft:`3px solid ${STI[dominant].color}`}}>
              <p style={{color:"#374151",fontSize:13,margin:0,lineHeight:1.7}}>{STI[dominant].desc}</p>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"0.75rem",marginBottom:"1.25rem"}}>
            {Object.entries(CTR).map(([name,info])=>{
              const cs=ctrSc[name]||0,pct=Math.round((cs/ctrTotal)*100),isMain=name===myCenter;
              return (
                <div key={name} style={{background:isMain?BG2+"cc":BG2,borderRadius:14,padding:"1.1rem",textAlign:"center",border:isMain?`2px solid ${info.color}`:"1px solid rgba(255,255,255,0.05)",position:"relative",overflow:"hidden"}}>
                  {isMain&&<div style={{position:"absolute",top:0,left:0,right:0,height:3,background:info.color}}/>}
                  <div style={{fontSize:28,marginBottom:4}}>{info.emoji}</div>
                  <div style={{color:isMain?info.color:"#64748b",fontWeight:800,fontSize:22,marginBottom:2}}>{pct}%</div>
                  <div style={{color:"white",fontWeight:700,fontSize:12,marginBottom:3}}>{name}</div>
                  <div style={{color:"#475569",fontSize:10,marginBottom:7}}>{info.desc}</div>
                  <div style={{background:"rgba(0,0,0,0.3)",borderRadius:4,height:5}}>
                    <div style={{height:"100%",background:info.color,borderRadius:4,width:`${pct}%`,transition:"width 1.5s"}}/>
                  </div>
                  {isMain&&<div style={{marginTop:6,background:`${info.color}22`,borderRadius:6,padding:"2px 8px",display:"inline-block"}}><span style={{color:info.color,fontSize:9,fontWeight:700}}>TU CENTRO</span></div>}
                </div>
              );
            })}
          </div>
          <div style={{background:"white",borderRadius:16,padding:"1.5rem",marginBottom:"1.25rem",boxShadow:"0 2px 10px rgba(0,0,0,0.06)"}}>
            <h3 style={{color:"#1e293b",margin:"0 0 1rem",fontSize:15,fontWeight:700}}>🏅 Top 3 Eneatipos</h3>
            {top3.map((t,i)=>(
              <div key={t.t} style={{display:"flex",alignItems:"center",gap:"0.75rem",padding:"0.75rem",borderRadius:10,background:i===0?"#ecfeff":"#f8fafc",marginBottom:8,border:i===0?`1px solid ${AQ}33`:"1px solid #f1f5f9"}}>
                <div style={{width:34,height:34,borderRadius:"50%",background:i===0?`linear-gradient(135deg,${AQ},#0EA5E9)`:i===1?`${PK}22`:"#f1f5f9",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{t.emoji}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:i===0?700:500,color:i===0?"#1e293b":"#64748b"}}>{["🥇","🥈","🥉"][i]} T{t.t} · {t.name}</div>
                  <div style={{background:"#f1f5f9",borderRadius:4,height:5,marginTop:4}}>
                    <div style={{height:"100%",background:t.color,borderRadius:4,width:`${(t.v/25)*100}%`}}/>
                  </div>
                </div>
                <span style={{color:t.color,fontWeight:700,fontSize:14}}>{t.v}/25</span>
              </div>
            ))}
          </div>
          <div style={{background:"white",borderRadius:16,padding:"1.5rem",marginBottom:"1.25rem",boxShadow:"0 2px 10px rgba(0,0,0,0.06)"}}>
            <h3 style={{color:"#1e293b",margin:"0 0 1rem",fontSize:15,fontWeight:700}}>📊 Distribución completa</h3>
            {ss.map(([t,v])=>{const ip=parseInt(t)===pt,ti2=TI[parseInt(t)];return(
              <div key={t} style={{marginBottom:9}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                  <span style={{fontSize:12,color:ip?"#1e293b":"#64748b",fontWeight:ip?700:400}}>{ti2.emoji} T{t} · {ti2.name}</span>
                  <span style={{fontSize:12,fontWeight:ip?700:400,color:ip?ti2.color:"#94a3b8"}}>{v}/25</span>
                </div>
                <div style={{background:"#f1f5f9",borderRadius:4,height:ip?9:5,overflow:"hidden"}}>
                  <div style={{height:"100%",background:ip?ti2.color:"#cbd5e1",borderRadius:4,width:`${(v/25)*100}%`,transition:"width 1.5s"}}/>
                </div>
              </div>
            );})}
          </div>
          <div style={{background:"white",borderRadius:16,padding:"1.5rem",marginBottom:"1.25rem",boxShadow:"0 2px 10px rgba(0,0,0,0.06)"}}>
            <h3 style={{color:"#1e293b",margin:"0 0 1rem",fontSize:15,fontWeight:700}}>🧠 Tu Análisis Personalizado</h3>
            <div style={{color:"#374151",lineHeight:1.85,fontSize:14}}>{renderText(analysis)}</div>
          </div>
          <div style={{background:`linear-gradient(135deg,${BG},${BG2})`,borderRadius:18,padding:"2rem",textAlign:"center",border:"1px solid rgba(6,182,212,0.15)"}}>
            <div style={{fontSize:40,marginBottom:"0.75rem"}}>🚀</div>
            <h3 style={{color:"white",margin:"0 0 0.5rem",fontSize:18,fontWeight:800}}>¿Listo para ir más profundo?</h3>
            <p style={{color:"#94a3b8",fontSize:13,margin:"0 0 1.5rem",lineHeight:1.7}}>Este perfil es el punto de partida. En una sesión de coaching diseñamos juntos tu camino real de transformación.</p>
            <div style={{background:`linear-gradient(135deg,${AQ},${PK})`,borderRadius:12,padding:"15px",cursor:"pointer"}}>
              <p style={{color:"white",fontWeight:800,margin:0,fontSize:15}}>💼 Agenda una sesión con José Pioquinto</p>
              <p style={{color:"rgba(255,255,255,0.7)",fontSize:11,margin:"4px 0 0"}}>Coach Certificado · Facilitador Lego Serious Play · Speaker · Colombia</p>
            </div>
          </div>
          <div style={{height:24}}/>
        </div>
      </div>
    );
  }
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
